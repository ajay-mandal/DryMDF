name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]
    paths:
      - "apps/frontend/**"
      - "packages/shared/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Validate Vercel secrets
        run: |
          missing=""
          [ -z "${{ secrets.VERCEL_TOKEN }}" ]      && missing="$missing\n  ❌ VERCEL_TOKEN"
          [ -z "${{ secrets.VERCEL_ORG_ID }}" ]     && missing="$missing\n  ❌ VERCEL_ORG_ID"
          [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ] && missing="$missing\n  ❌ VERCEL_PROJECT_ID"
          if [ -n "$missing" ]; then
            echo "Missing GitHub secrets — go to Settings → Secrets and variables → Actions:"
            echo -e "$missing"
            echo ""
            echo "⚠️  VERCEL_TOKEN must be a Personal Access Token from vercel.com/account/tokens"
            echo "   NOT a JWT (avoid tokens containing '.' or '-' characters)"
            exit 1
          fi
          echo "✅ All required secrets present"

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: |
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
          echo "### Frontend Deployed! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "URL: ${{ secrets.PRODUCTION_URL }}" >> $GITHUB_STEP_SUMMARY
