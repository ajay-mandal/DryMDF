name: Deploy Backend to GCP Cloud Run

on:
  push:
    branches: [development]
    paths:
      - "apps/backend/**"
      - "packages/shared/**"
      - "docker/Dockerfile.api"
      - ".github/workflows/deploy-backend-dev.yml"
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  SERVICE_NAME: drymdf-backend-dev
  IMAGE_NAME: drymdf-backend-dev
  # Non-sensitive GCP config - safe to hardcode in env
  GCP_AR_REPO: drymdf-repo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=""
          [ -z "${{ secrets.GCP_SA_KEY }}" ]           && missing="$missing\n  ❌ GCP_SA_KEY"
          [ -z "${{ secrets.GCP_PROJECT_ID }}" ]        && missing="$missing\n  ❌ GCP_PROJECT_ID"
          [ -z "${{ secrets.UPSTASH_REDIS_HOST }}" ]    && missing="$missing\n  ❌ UPSTASH_REDIS_HOST"
          [ -z "${{ secrets.FRONTEND_DEV_URL }}" ]      && missing="$missing\n  ❌ FRONTEND_DEV_URL"
          if [ -n "$missing" ]; then
            echo "Missing GitHub secrets — go to Settings → Secrets and variables → Actions:"
            echo -e "$missing"
            exit 1
          fi
          echo "✅ All required secrets present"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile.api \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --port=4000
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=1
            --concurrency=40
            --timeout=300
          env_vars: |
            NODE_ENV=development
            API_PREFIX=api
            CORS_ORIGIN=${{ secrets.FRONTEND_DEV_URL }}
            REDIS_HOST=${{ secrets.UPSTASH_REDIS_HOST }}
            REDIS_PORT=${{ secrets.UPSTASH_REDIS_PORT }}
            REDIS_PASSWORD=${{ secrets.UPSTASH_REDIS_PASSWORD }}
            PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
            PUPPETEER_ARGS=--no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage --disable-gpu
            STORAGE_TYPE=local
            THROTTLE_TTL=60000
            THROTTLE_LIMIT=20
            NODE_OPTIONS=--max-old-space-size=384

      - name: Get Cloud Run URL
        id: get-url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.GCP_REGION }} --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "### Backend Deployed! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "URL: $URL" >> $GITHUB_STEP_SUMMARY
